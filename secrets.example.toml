# ─────────────────────────────────────────────────────────────────────────────
# Inside Out Multi-Agent System — Secrets Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Copy this file to .streamlit/secrets.toml and fill in your real values:
#   cp .streamlit/secrets.example.toml .streamlit/secrets.toml
#
# NEVER commit secrets.toml to version control — it is listed in .gitignore.
# ─────────────────────────────────────────────────────────────────────────────

[llm]
# Choose which OpenAI-compatible backend to use: "jan" or "groq"
provider = "jan"
max_tokens = 500
temperature = 0.9

[jan]
# Local Jan AI server — download from https://jan.ai and start the server
base_url = "http://127.0.0.1:1337/v1"
api_key = "your_jan_api_key_here"
model_name = "Meta-Llama-3_1-8B-Instruct_Q4_K_M"

[groq]
# Groq Cloud API — https://console.groq.com/docs/quickstart
base_url = "https://api.groq.com/openai/v1"
api_key = "your_groq_api_key_here"
model_name = "llama-3.1-8b-instant"

[weather]
# WeatherAPI.com — sign up for a free key at https://www.weatherapi.com/signup.aspx
api_key = "your_weather_api_key_here"
timeout = 10
max_retries = 3

[ui]
# Show Streamlit debug sidebar panel (friend toggles/tools/test connection)
debug_panel = false
